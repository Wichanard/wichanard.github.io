remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "neon" # ตัวนี้จะเปลี่ยนปุ่มและลิงก์เป็นสีเขียว/ชมพูเรืองแสง

# ข้อมูลหุ่นยนต์
author:
  name   : "WICHANARD [AI-UNIT]"
  avatar : "/PIC/1.jpg"
  bio    : "🤖 **STATUS:** <span style='color: #00ff00;'>ONLINE</span>"
  location: "THAILAND NODE"
  
# บังคับให้หน้าเว็บกว้างขึ้น (เพื่อให้ใส่สไลด์แล้วสวย)
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      classes: wide

# 4. ข้อมูลพื้นฐาน
include: ["_pages", "_posts", "_projects"]
markdown: kramdown
highlighter: rouge # ตัวเน้นสี Code ให้ดูเป็น Hacker

# 5. สไลด์ RGB (จะไปเรียกใช้ในหน้า Markdown)
# เราจะตั้งค่าให้อ่านไฟล์จากโฟลเดอร์โครงการได้แม่นยำขึ้น
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      classes: wide # ทำให้หน้ากว้างขึ้น ดูเป็นหน้าจอ Monitor เท่ๆ
